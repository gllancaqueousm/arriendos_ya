<section class="filter-card">
  <div class="filter-header">
    <div>
      <p class="eyebrow">Filtros</p>
      <h2>Busca y ordena tu portafolio</h2>
    </div>

    <button type="button" class="clear-button" (click)="clear.emit()">Limpiar filtros</button>
  </div>

  <div class="filter-grid">
    <label class="field">
      <span>Disponibilidad</span>
      <select
        [ngModel]="filters.disponible"
        (ngModelChange)="updateFilter('disponible', $event)"
      >
        <option *ngFor="let option of disponibleOptions" [ngValue]="option.value">{{ option.label }}</option>
      </select>
    </label>

    <label class="field">
      <span>Comuna</span>
      <select
        [ngModel]="filters.comuna"
        (ngModelChange)="updateFilter('comuna', $event)"
      >
        <option value="Todas">Todas</option>
        <option *ngFor="let comuna of comunas" [ngValue]="comuna">{{ comuna }}</option>
      </select>
    </label>
  </div>
</section>
