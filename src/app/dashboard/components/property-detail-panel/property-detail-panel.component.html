<aside class="detail-card">
  <ng-container *ngIf="editableProperty as property; else emptyState">
    <div class="panel-header">
      <div>
        <p class="eyebrow">Detalle</p>
        <h2>{{ property.id ? property.direccion : 'Nueva Propiedad' }}</h2>
      </div>
      <span class="property-id" *ngIf="property.id">{{ property.id }}</span>
    </div>

    <div class="field-grid">
      <label class="field field-full">
        <span>Dirección</span>
        <input type="text" [(ngModel)]="property.direccion" />
      </label>

      <label class="field">
        <span>Comuna</span>
        <input type="text" [(ngModel)]="property.comuna" />
      </label>

      <label class="field">
        <span>Ciudad</span>
        <input type="text" [(ngModel)]="property.ciudad" />
      </label>

      <label class="field field-full">
        <span>Región</span>
        <input type="text" [(ngModel)]="property.region" />
      </label>

      <label class="field">
        <span>Habitaciones</span>
        <input type="number" min="0" [(ngModel)]="property.numeroHabitaciones" />
      </label>

      <label class="field">
        <span>Baños</span>
        <input type="number" min="0" [(ngModel)]="property.numeroBanos" />
      </label>

      <label class="field">
        <span>Precio Arriendo (CLP)</span>
        <input type="number" min="0" [(ngModel)]="property.precioArriendo" />
      </label>

      <label class="field">
        <span>Disponible</span>
        <select [(ngModel)]="property.disponible">
          <option [ngValue]="true">Sí</option>
          <option [ngValue]="false">No</option>
        </select>
      </label>
    </div>

    <p *ngIf="errorMessage" class="error-message">{{ errorMessage }}</p>

    <div class="panel-footer">
      <span class="helper-text">Edita información clave y guarda los cambios.</span>
      <button type="button" class="save-button" [disabled]="isSaving" (click)="saveChanges()">
        <span *ngIf="isSaving">Guardando...</span>
        <span *ngIf="!isSaving">Guardar cambios</span>
      </button>
    </div>
  </ng-container>

  <ng-template #emptyState>
    <div class="empty-state">
      <h2>Sin selección</h2>
      <p>Selecciona una propiedad para revisar o actualizar su información.</p>
    </div>
  </ng-template>
</aside>
