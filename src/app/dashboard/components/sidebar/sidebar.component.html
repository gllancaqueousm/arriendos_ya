<aside class="sidebar">
  <div class="brand">Arriendos Ya</div>

  <nav class="menu">
    <ng-container *ngFor="let item of menuItems">
      <a
        *ngIf="item.path; else staticMenuItem"
        class="menu-item"
        [routerLink]="item.path"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
        >{{ item.label }}</a
      >

      <ng-template #staticMenuItem>
        <span class="menu-item menu-item-disabled">{{ item.label }}</span>
      </ng-template>
    </ng-container>
  </nav>

  <div class="user-card">
    <span class="avatar">GY</span>
    <div>
      <p class="name">Guille Y.</p>
      <p class="role">Administrador</p>
    </div>
  </div>
</aside>
